<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek URL Shortener</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --background: #0F172A;
            --card-bg: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #334155;
            --success: #10B981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #818CF8, #C084FC);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-top: -10px;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            display: flex;
            gap: 12px;
        }

        input[type="url"] {
            flex: 1;
            padding: 14px 16px;
            background-color: var(--background);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="url"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
        }

        button {
            padding: 14px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        /* Results Display Section */
        .result-box {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
            display: none; /* Hidden by default */
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .url-display-row {
            margin-bottom: 18px;
        }

        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: block;
        }

        .url-value-card {
            background-color: var(--background);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .url-text {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-main);
        }

        .short-url-text {
            color: #818CF8;
            font-weight: 600;
            text-decoration: none;
        }

        .short-url-text:hover {
            text-decoration: underline;
        }

        .copy-btn {
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background-color: var(--border);
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>LinkMinify</h2>
        <p class="subtitle">Enter your messy long link to make it short and clean</p>
        
        <form id="shortenForm" class="form-group">
            <input type="url" id="longUrl" placeholder="https://example.com/very/long/path/here" required autocomplete="off">
            <button type="submit">Shorten</button>
        </form>

        <div class="result-box" id="resultBox">
            
            <div class="url-display-row">
                <span class="label">Original Long Link</span>
                <div class="url-value-card">
                    <span class="url-text" id="displayLongUrl"></span>
                </div>
            </div>

            <div class="url-display-row">
                <span class="label">Shortened Link</span>
                <div class="url-value-card">
                    <a href="" target="_blank" class="url-text short-url-text" id="displayShortUrl"></a>
                    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy Link</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const form = document.getElementById('shortenForm');
    const resultBox = document.getElementById('resultBox');
    const displayLongUrl = document.getElementById('displayLongUrl');
    const displayShortUrl = document.getElementById('displayShortUrl');
    const copyBtn = document.getElementById('copyBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const longUrl = document.getElementById('longUrl').value;

        try {
            const response = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ longUrl })
            });

            const data = await response.json();
            
            if (data.shortUrl) {
                // Populate the new professional display blocks
                displayLongUrl.textContent = longUrl;
                displayShortUrl.textContent = data.shortUrl;
                displayShortUrl.href = data.shortUrl;
                
                // Reset copy button state
                copyBtn.textContent = "Copy Link";
                copyBtn.style.borderColor = "var(--border)";

                // Unhide the result panel visually
                resultBox.style.display = 'block';
            } else {
                alert(`Error: ${data.error}`);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Could not reach backend server.');
        }
    });

    // Helpful helper function to copy the link with 1 click
    function copyToClipboard() {
        const shortUrl = displayShortUrl.textContent;
        navigator.clipboard.writeText(shortUrl).then(() => {
            copyBtn.textContent = "Copied!";
            copyBtn.style.borderColor = "var(--success)";
        });
    }
</script>

</body>
</html>
